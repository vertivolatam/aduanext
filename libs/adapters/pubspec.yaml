name: aduanext_adapters
description: AduaNext Secondary Adapters — Implements domain Ports for ATENA, RIMM, signing (gRPC), notifications, and persistence.
version: 0.1.0
publish_to: none

# Implements Ports from libs/domain. Has I/O dependencies (gRPC, HTTP, DB).

environment:
  sdk: ^3.6.0

dependencies:
  aduanext_domain:
    path: ../domain
  grpc: ^4.0.1
  # Generator emits $_clearField / aI / pPM (protobuf >=5). Keep in sync with
  # the plugin used for `protoc --dart_out=grpc:...`.
  protobuf: ^5.0.0
  fixnum: ^1.1.0
  http: ^1.2.0
  crypto: ^3.0.3
  meta: ^1.16.0
  sqflite_common: ^2.5.4
  sqflite_common_ffi: ^2.3.3
  postgres: ^3.5.0

dev_dependencies:
  test: ^1.25.0
  lints: ^5.1.0
