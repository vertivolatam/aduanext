# SECRET TEMPLATE — DO NOT FILL IN PLAINTEXT VALUES IN THIS FILE.
#
# This is a stencil showing what real secrets the cluster needs. The real
# Secret manifest is sealed by `kubeseal` (from bitnami-labs/sealed-secrets)
# and lives in a separate, encrypted file (or in the cluster's Vault).
#
# Workflow to create a real sealed secret:
#
#   1. Fill in plaintext values in a temp file (NEVER commit it).
#   2. Run:
#        kubeseal --controller-name sealed-secrets --controller-namespace kube-system \
#                 -o yaml < temp-secret.yaml > infrastructure/k8s/base/sealed-secret.yaml
#   3. Commit only the sealed output (`sealed-secret.yaml`).
#   4. Delete the plaintext temp file.
#
# Production deploys use external-secrets + Vault instead — this template
# is for Minikube/dev only.
apiVersion: v1
kind: Secret
metadata:
  name: aduanext-secrets
  namespace: aduanext
type: Opaque
stringData:
  # PostgreSQL primary database
  POSTGRES_PASSWORD: "REPLACE_ME"
  # Redis cache
  REDIS_PASSWORD: "REPLACE_ME"
  # ATENA OIDC client secret (per-tenant, stored separately in prod)
  ATENA_OIDC_CLIENT_SECRET: "REPLACE_ME"
  # XAdES signing key passphrase
  SIGNING_KEY_PASSPHRASE: "REPLACE_ME"
