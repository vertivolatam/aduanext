# Template: imagePullSecret granting the aduanext namespace access to
# the in-cluster Harbor registry.
#
# This is a TEMPLATE — do not commit real credentials. Instead run:
#
#   kubectl create secret docker-registry harbor-pull-secret \
#     --docker-server=harbor.aduanext.local:30002 \
#     --docker-username=admin \
#     --docker-password="$(make -s harbor-admin-password)" \
#     --docker-email=admin@aduanext.local \
#     --namespace=aduanext \
#     --dry-run=client -o yaml > /tmp/harbor-pull-secret.yaml
#
# Then seal with `kubeseal` before committing.
#
# Wire the secret into the aduanext Helm release by setting
# `global.imagePullSecrets: [{name: harbor-pull-secret}]` in values.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: harbor-pull-secret
  namespace: aduanext
type: kubernetes.io/dockerconfigjson
data:
  # Base64 of the docker config JSON. Generated by the kubectl command
  # in the comment above — NEVER hand-edit.
  .dockerconfigjson: PLACEHOLDER_BASE64
