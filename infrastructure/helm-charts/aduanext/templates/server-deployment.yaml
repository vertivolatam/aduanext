{{- if .Values.server.enabled }}
# Placeholder Deployment for the Serverpod backend. The image path points
# at Harbor (VRTV-58) — actual builds + push come in a later iteration.
# Until then, this Deployment will stay in `ImagePullBackOff`, which is
# fine for chart-validation purposes.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aduanext-server
  labels:
    {{- include "aduanext.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      {{- include "aduanext.serverSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "aduanext.serverSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: server
          image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
          imagePullPolicy: {{ .Values.server.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: aduanext-config
                optional: true
            - secretRef:
                name: aduanext-secrets
                optional: true
          resources:
            {{- toYaml .Values.server.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: aduanext-server
  labels:
    {{- include "aduanext.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "aduanext.serverSelectorLabels" . | nindent 4 }}
{{- end }}
